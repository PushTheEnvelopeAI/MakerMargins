name: CI

on:
  push:
  pull_request:
    branches: [main]

# Cancel any in-progress run on the same branch when a new push arrives
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Download iOS Simulator Runtime
        run: |
          # List available runtimes — macos-latest typically has iOS 18 pre-installed.
          # Only download if no iOS runtime is found.
          if xcrun simctl list runtimes | grep -q "iOS"; then
            echo "iOS simulator runtime already available:"
            xcrun simctl list runtimes | grep iOS
          else
            echo "No iOS runtime found, downloading..."
            xcodebuild -downloadPlatform iOS
          fi

      - name: Prepare Simulator
        run: |
          # Use the latest available iPhone device type
          RUNTIME=$(xcrun simctl list runtimes | grep iOS | tail -1 | awk -F'[()]' '{print $2}' | awk '{print $NF}')
          echo "Using runtime: $RUNTIME"
          DEVICE_UDID=$(xcrun simctl create "CI iPhone" "com.apple.CoreSimulator.SimDeviceType.iPhone-16" "$RUNTIME")
          xcrun simctl boot "$DEVICE_UDID"
          echo "DEVICE_UDID=$DEVICE_UDID" >> "$GITHUB_ENV"

      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -scheme MakerMargins \
            -destination "platform=iOS Simulator,id=$DEVICE_UDID" \
            CODE_SIGNING_ALLOWED=NO \
            IPHONEOS_DEPLOYMENT_TARGET=18.0

      - name: Run Unit Tests
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme MakerMargins \
            -only-testing MakerMarginsTests \
            -destination "platform=iOS Simulator,id=$DEVICE_UDID" \
            CODE_SIGNING_ALLOWED=NO \
            IPHONEOS_DEPLOYMENT_TARGET=18.0 \
            -resultBundlePath TestResults

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: TestResults.xcresult
