name: Release

# Triggered by pushing a version tag (e.g. v1.0.0) or manually via workflow_dispatch.
# Archives the app, signs it with the distribution certificate, uploads to App Store
# Connect (TestFlight), and uploads dSYMs to Sentry for crash symbolication.
#
# Required GitHub Secrets (configure in repo Settings → Secrets and Variables → Actions):
#
#   DISTRIBUTION_CERTIFICATE_P12_BASE64  — base64 of .p12 export of iOS Distribution cert
#   DISTRIBUTION_CERTIFICATE_PASSWORD    — password set during .p12 export
#   PROVISIONING_PROFILE_BASE64          — base64 of .mobileprovision file
#   APPSTORE_API_KEY_ID                  — App Store Connect API key ID
#   APPSTORE_API_ISSUER_ID              — API issuer ID (displayed above keys list in ASC)
#   APPSTORE_API_KEY_P8_BASE64          — base64 of the .p8 file (downloaded once, cannot re-download)
#   KEYCHAIN_PASSWORD                    — temporary keychain password for CI runner (any string)
#   TEAM_ID                              — Apple Developer Team ID (Developer portal → Membership)
#   POSTHOG_API_KEY_PROD                 — production PostHog project API key
#   SENTRY_DSN_PROD                      — production Sentry DSN
#   SENTRY_AUTH_TOKEN                    — Sentry org auth token (org:ci scope) for dSYM upload
#   SENTRY_ORG                           — Sentry organization slug
#   SENTRY_PROJECT                       — Sentry project slug
#   REVENUECAT_API_KEY_PROD              — production RevenueCat public SDK key

on:
  push:
    tags: [ 'v*.*.*' ]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false  # Don't cancel a release mid-upload

jobs:
  release:
    name: Archive & Upload
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      # --- Secrets injection ---

      - name: Write production secrets into Secrets.swift
        env:
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY_PROD }}
          POSTHOG_HOST: "https://us.i.posthog.com"
          SENTRY_DSN: ${{ secrets.SENTRY_DSN_PROD }}
          REVENUECAT_API_KEY: ${{ secrets.REVENUECAT_API_KEY_PROD }}
        run: |
          cat > MakerMargins/Engine/Secrets.swift <<EOF
          import Foundation

          enum Secrets {
              static let posthogAPIKey = "$POSTHOG_API_KEY"
              static let posthogHost = "$POSTHOG_HOST"
              static let sentryDSN = "$SENTRY_DSN"
              static let revenueCatAPIKey = "$REVENUECAT_API_KEY"
          }
          EOF

      # --- Code signing ---

      - name: Create temporary keychain
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain

      - name: Import distribution certificate
        env:
          P12_BASE64: ${{ secrets.DISTRIBUTION_CERTIFICATE_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.DISTRIBUTION_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$P12_BASE64" | base64 --decode > cert.p12
          security import cert.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm cert.p12

      - name: Install provisioning profile
        env:
          PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROFILE_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      # --- Build ---

      - name: Extract version from tag
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.0"
          fi
          echo "marketing_version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$GITHUB_RUN_NUMBER" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION, Build: $GITHUB_RUN_NUMBER"

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Archive
        env:
          TEAM_ID: ${{ secrets.TEAM_ID }}
        run: |
          set -o pipefail
          xcodebuild archive \
            -project MakerMargins.xcodeproj \
            -scheme MakerMargins \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/MakerMargins.xcarchive" \
            -destination "generic/platform=iOS" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            MARKETING_VERSION="${{ steps.version.outputs.marketing_version }}" \
            CURRENT_PROJECT_VERSION="${{ steps.version.outputs.build_number }}" \
            | xcpretty

      - name: Export archive for App Store
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>uploadSymbols</key>
              <true/>
              <key>destination</key>
              <string>upload</string>
          </dict>
          </plist>
          PLIST

          set -o pipefail
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/MakerMargins.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/export" \
            | xcpretty

      # --- Upload to App Store Connect ---

      - name: Prepare App Store Connect API key
        env:
          API_KEY_BASE64: ${{ secrets.APPSTORE_API_KEY_P8_BASE64 }}
          API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
        run: |
          mkdir -p ~/.private_keys
          echo "$API_KEY_BASE64" | base64 --decode > ~/.private_keys/AuthKey_${API_KEY_ID}.p8

      - name: Upload to App Store Connect
        env:
          API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APPSTORE_API_ISSUER_ID }}
        run: |
          xcrun altool --upload-app \
            -f "$RUNNER_TEMP/export/MakerMargins.ipa" \
            -t ios \
            --apiKey "$API_KEY_ID" \
            --apiIssuer "$API_ISSUER_ID"

      # --- Upload dSYMs to Sentry ---

      - name: Install Sentry CLI
        run: curl -sL https://sentry.io/get-cli/ | bash

      - name: Upload dSYMs to Sentry
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          sentry-cli debug-files upload \
            --org "$SENTRY_ORG" \
            --project "$SENTRY_PROJECT" \
            "$RUNNER_TEMP/MakerMargins.xcarchive/dSYMs"

      # --- Cleanup ---

      - name: Clean up keychain
        if: always()
        run: security delete-keychain build.keychain 2>/dev/null || true

      - name: Clean up API key
        if: always()
        run: rm -rf ~/.private_keys

      # --- Artifacts ---

      - name: Upload archive as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-archive
          path: |
            ${{ runner.temp }}/MakerMargins.xcarchive
          retention-days: 30
